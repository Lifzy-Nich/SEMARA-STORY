<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Price List Semara Story</title>
    <style>
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: white; }
        
        /* Wadah Utama */
        .container { position: relative; width: 100%; height: 100%; }

        /* Iframe PDF */
        iframe { border: none; width: 100%; height: 100%; }

        /* Penutup Ikon Panah (Kanan Atas) */
        .blocker-top {
            position: absolute;
            top: 0;
            right: 0;
            width: 150px; /* Lebar area yang ditutup */
            height: 60px;
            background-color: #f1f3f4; /* Warna ini biasanya cocok dengan background viewer */
            z-index: 10;
        }

        /* Tombol WhatsApp */
        .wa-float {
            position: fixed;
            width: 60px;
            height: 60px;
            bottom: 80px; /* Naik sedikit agar tidak tertutup bar halaman */
            right: 20px;
            background-color: #25d366;
            border-radius: 50px;
            box-shadow: 2px 5px 10px rgba(0,0,0,0.2);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .wa-icon { width: 35px; height: 35px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="blocker-top"></div>

        <iframe src="https://docs.google.com/viewer?url=https://lifzy-nich.github.io/SEMARA-STORY/PRICE%20LIST%20SEMARA%20STORY.pdf&embedded=true"></iframe>
    </div>

    <a href="https://wa.me/6287750700748" class="wa-float" target="_blank">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WA" class="wa-icon">
    </a>

</body>
</html>
